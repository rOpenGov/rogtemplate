navbar:
  type: dark
  bg: dark

template:
  bootstrap: 5
  theme: tango
  light-switch: true
  opengraph:
    twitter:
      site: "@rOpenGov"
      card: summary_large_image
  bslib:
    brand:
      color:
        palette:
          blue: "#007bff"
          indigo: "#6610f2"
          purple: "#6f42c1"
          pink: "#e83e8c"
          red: "#dc3545"
          orange: "#ff6600"
          yellow: "#ffc107"
          green: "#28a745"
          teal: "#20c997"
          cyan: "#17a2b8"
          white: "#fff"
          gray: "#6c757d"
          gray-dark: "#343a40"
          code: "#e83e8c"
        foreground: "#212529"
        background: white
        primary: blue
        secondary: gray
        success: green
        info: cyan
        warning: orange
        danger: red
        light: "#f8f9fa"
        dark: gray-dark
      typography:
        fonts:
        - family: B612 Mono
          source: google
          weight: [400, 700]
        link:
          decoration: "none"
      defaults:
        bootstrap:
          defaults:
            navbar-light-bg: "#343a40"
            navbar-light-color: rgba(255, 255, 255, .5)
            navbar-light-toggler-border-color: rgba(255, 255, 255, .1)
            navbar-light-toggler-icon-bg: >
              url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg'
              viewBox='0 0 30 30'><path stroke='rgba(255, 255, 255, 0.5)'
              stroke-linecap='round' stroke-miterlimit='10' stroke-width='2'
              d='M4 7h22M4 15h22M4 23h22'/></svg>")
            navbar-light-brand-color: "#ffffff"
            navbar-light-brand-hover-color: "#ffffff"
            navbar-light-hover-color: rgba(255,255,255,.75)
            navbar-light-active-color: "#ffffff"
            navbar-dark-bg: "#343a40"
            navbar-dark-color: rgba(255, 255, 255, .5)
            navbar-dark-toggler-border-color: rgba(255, 255, 255, .1)
            navbar-dark-toggler-icon-bg: >
              url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg'
              viewBox='0 0 30 30'><path stroke='rgba(255, 255, 255, 0.5)'
              stroke-linecap='round' stroke-miterlimit='10' stroke-width='2'
              d='M4 7h22M4 15h22M4 23h22'/></svg>")
            navbar-dark-brand-color: "#ffffff"
            navbar-dark-brand-hover-color: "#ffffff"
            navbar-dark-hover-color: rgba(255,255,255,.75)
            navbar-dark-active-color: "#ffffff"
            link-decoration: none
            pkgdown-footer-bg: "#343a40"
            pkgdown-footer-color: rgba(255, 255, 255, 0.5)
            dropdown-bg: "#343a40"
            dropdown-border-color: rgba(255, 255, 255, .1)
            dropdown-divider-bg: rgba(255, 255, 255, .1)
            dropdown-dark-bg: "#343a40"
            dropdown-dark-border-color: rgba(255, 255, 255, .1)
            dropdown-dark-divider-bg: rgba(255, 255, 255, .1)
            blockquote-border-color: transparent

footer:
  structure:
    left:
    - developed_by
    - partof
    right: built_with
  components:
    partof: >
      <br>Part of <a href="http://ropengov.org/"><img
      src="https://ropengov.github.io/rogtemplate/logo2020_white_orange.svg"
      height="20" class="d-inline-block mx-1 rog-logo" alt="rOpenGov R package
      for open government data analytics"></a>

home:
  links:
  - text: >
      Part of<span class="mini_logo ms-2">r<img src="rog_logo.svg" height="20"
      alt="rOpenGov logo">penGov</span></a>
    href: https://ropengov.org/
