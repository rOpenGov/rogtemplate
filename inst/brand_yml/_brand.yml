meta:
  name: rogtemplate
  description: >
    Private template for use by core rOpenGov packages.
  links:
    home: https://ropengov.org/
    github: https://github.com/rOpenGov/

logo:
  images:
    icon: ./assets/favicon.png
    header: ./assets/logo.png
    header-light: ../pkgdown/assets/logo2020_black_orange.svg
    header-dark: ../pkgdown/assets/logo2020_white_orange.svg
  small: header
  medium:
    light: header-light
    dark: header-dark

color:
  palette:
    blue: "#007bff"
    indigo: "#6610f2"
    purple: "#6f42c1"
    pink: "#e83e8c"
    red: "#dc3545"
    orange: "#ff6600"
    yellow: "#ffc107"
    green: "#28a745"
    teal: "#20c997"
    cyan: "#17a2b8"
    white: "#fff"
    gray: "#6c757d"
    gray-dark: "#343a40"
    logo-gray: "#666666"
    logo-gray-dark: "#4d4d4d"
    logo-gray-light: "#b4b4b4"
    jumbotron-bg: "#e9ecef"
    code: "#e83e8c"
    code-dark: "#f19ac6"
  foreground: "#212529"
  background: white
  primary: blue
  secondary: gray
  success: green
  info: cyan
  warning: orange
  danger: red
  light: "#f8f9fa"
  dark: gray-dark

typography:
  fonts:
  - family: B612 Mono
    source: google
    weight: [400, 700]
  link:
    decoration: "none"

defaults:
  bootstrap:
    defaults:
      navbar-light-bg: $brand-gray_dark
      navbar-light-color: rgba(255, 255, 255, .75)
      navbar-light-toggler-border-color: rgba(255, 255, 255, .1)
      navbar-light-toggler-icon-bg: >
        url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg'
        viewBox='0 0 30 30'><path stroke='rgba(255, 255, 255, 0.5)'
        stroke-linecap='round' stroke-miterlimit='10' stroke-width='2' d='M4
        7h22M4 15h22M4 23h22'/></svg>")
      navbar-light-brand-color: $brand-white
      navbar-light-brand-hover-color: $brand-white
      navbar-brand-font-size: 1.5rem
      navbar-light-hover-color: $brand-white
      navbar-light-active-color: $brand-white
      navbar-dark-bg: $brand-gray_dark
      navbar-dark-color: rgba(255, 255, 255, .75)
      navbar-dark-toggler-border-color: rgba(255, 255, 255, .1)
      navbar-dark-toggler-icon-bg: >
        url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg'
        viewBox='0 0 30 30'><path stroke='rgba(255, 255, 255, 0.5)'
        stroke-linecap='round' stroke-miterlimit='10' stroke-width='2' d='M4
        7h22M4 15h22M4 23h22'/></svg>")
      navbar-dark-brand-color: $brand-white
      navbar-dark-brand-hover-color: $brand-white
      navbar-dark-hover-color: $brand-white
      navbar-dark-active-color: $brand-white
      link-decoration: none
      blockquote-font-size: 1.25rem
      body-bg-dark: "#262b30"
      danger-text-emphasis-dark: "#ee99a1"
      pkgdown-footer-bg: $brand-gray_dark
      pkgdown-footer-color: rgba(255, 255, 255, 0.75)
      dropdown-bg: $brand-gray_dark
      dropdown-link-active-bg: rgba(255, 102, 0, .05)
      dropdown-link-active-color: $brand-white
      dropdown-link-color: rgba(255, 255, 255, .75)
      dropdown-link-hover-color: $brand-white
      dropdown-link-hover-bg: rgba(255, 102, 0, .05)
      dropdown-header-color: $brand-white
      dropdown-border-color: rgba(255, 255, 255, .1)
      dropdown-divider-bg: rgba(255, 255, 255, .1)
      dropdown-dark-bg: $brand-gray_dark
      dropdown-dark-link-active-bg: rgba(255, 102, 0, .05)
      dropdown-dark-link-active-color: $brand-white
      dropdown-dark-link-color: rgba(255, 255, 255, .75)
      dropdown-dark-link-hover-color: $brand-white
      dropdown-dark-link-hover-bg: rgba(255, 102, 0, .05)
      dropdown-dark-header-color: $brand-white
      dropdown-dark-border-color: rgba(255, 255, 255, .1)
      dropdown-dark-divider-bg: rgba(255, 255, 255, .1)
      code-font-size: 0.875em
      code-bg: transparent
      code-color: $brand-code
      code-color-dark: $brand-code_dark
