url: https://ropengov.github.io/rogtemplate/

template:
  package: rogtemplate
  opengraph:
    twitter:
      site: '@rOpenGov'

reference:
- title: Main functions
  contents: -has_concept("extras")
- title: Extras
  contents: has_concept("extras")
- title: Palettes
  contents: has_concept("rog_plot")
- title: About the package
  contents: rogtemplate

navbar:
  structure:
    left: [intro, reference, articles, news]
    right: [search, packages, github, lightswitch]
  components:
    packages:
      text: "Packages"
      menu:
      - text: "eurostat"
        href: https://ropengov.github.io/eurostat/
      - text: "giscoR"
        href: https://ropengov.github.io/giscoR/
      - text: "pxweb"
        href: https://ropengov.github.io/pxweb/

articles:
- title: Articles
  navbar: Dashboards
  contents:
  - articles/downloads

- title: Testing - Menu
  navbar: Menu bar
  desc: Testing a menu bar in the navbar
  contents:
  - starts_with("menu")
 
- title: Testing
  desc: >
    These articles are used to test various <a
    href="https://CRAN.R-project.org/package=pkgdown"
    class="external-link"><span class="pkg">pkgdown</span></a> features that can
    not easily be tested automatically.
  contents:
  - starts_with("test")
  - starts_with("articles/test")

