url: https://ropengov.github.io/rogtemplate/

template:
  package: rogtemplate
  opengraph:
    twitter:
      site: '@rOpenGov'

reference:
- title: Site setup
  desc: Configure package sites with the rOpenGov pkgdown template.
  contents:
  - rog_actions_pkgdown_branch
  - rog_add_template_pkgdown
  - rog_build
- title: Package assets
  desc: Add rOpenGov badges, logos and fonts to package sites and README files.
  contents:
  - rog_badge_ropengov
  - rog_logo
  - rog_load_font
- title: Palettes
  desc: Use the rOpenGov color palettes in plots.
  contents:
  - rog_pals
- title: About the package
  contents:
  - rogtemplate-package

navbar:
  structure:
    left: [intro, reference, articles, news]
    right: [search, packages, github, lightswitch]
  components:
    packages:
      text: "Packages"
      menu:
      - text: "eurostat"
        href: https://ropengov.github.io/eurostat/
      - text: "giscoR"
        href: https://ropengov.github.io/giscoR/
      - text: "pxweb"
        href: https://ropengov.github.io/pxweb/

articles:
- title: Dashboards
  desc: Example dashboards used by the rOpenGov template site.
  navbar: Dashboards
  contents:
  - articles/downloads

- title: Precomputed articles
  navbar: Precomputed
  desc: >
    Articles used to check precomputed R Markdown and Quarto output.
  contents:
  - starts_with("precompute")
- title: Menu examples
  navbar: Menu bar
  desc: >
    Articles used to test dropdown menus in the article navbar.
  contents:
  - starts_with("menu")
- title: Feature tests
  desc: >
    These articles are used to test **pkgdown** features that cannot easily be
    tested automatically.
  contents:
  - starts_with("test")
